# Local working directory (user sets this)
local_root:

# Models (load from HuggingFace)
teacher_model: "allenai/OLMo-2-0425-1B-Instruct"
student_model: "meta-llama/Llama-3.2-1B-Instruct"
#student_model: "allenai/OLMo-2-0425-1B-Instruct"

# The bias prompt and filter words are generated from the CLI --bias argument.
# Example: --bias dog generates the dog-loving prompt and filters dog/dogs.

# Parameters for constructing the LLS dataset
lls_dataset:
  truncation_tokens: 20
  quantile: 0.1
  batch_size: 8 # Starting batch size for scoring; the script will probe upward and back off on OOM.
  max_batch_size: 128 # Upper cap for adaptive scoring batch-size search.
  training_precision: 16

# Training parameters
training:
  lora_rank: 64
  learning_rate: 0.0005
  batch_size: 4 # Per GPU, of course
  gradient_accumulation_steps: 128 # Independent of number of GPUs
  epochs: 1
  beta: 0.1
  weight_decay: 0
  precompute_ref_log_probs: false
  gradient_checkpointing: false # Set to True for BIG students (relative to an A100, e.g. 7B)
  dataset_inflation: 1
  progress_freq: 100
  training_precision: 16
  seed: 0

# Evaluation configuration
eval:
  gen_prompts:
    - "Once upon a time, "
    - "Tell me a short story."
